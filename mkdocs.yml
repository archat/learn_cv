site_name: Complete Computer Vision Guide
site_description: A comprehensive guide from beginner to advanced topics in Computer Vision.
site_author: "Computer Vision Learner"
repo_url: https://github.com/USERNAME/test_ag_cv
edit_uri: edit/main/docs/

theme:
  name: material
  logo: material/robot-outline # Optional, just a nice default
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true # Math rendering
  - admonition

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Introduction: index.md
  - Fundamentals:
    - What is Computer Vision?: fundamentals/intro.md
  - Classical Image Processing:
    - Image Filters: classical/filters.md
    - Convolutions: classical/convolutions.md
  - Convolutional Neural Networks (CNNs):
    - Introduction to CNNs: cnn/intro.md
    - Image Classification: cnn/classification.md
    - Object Detection: cnn/object_detection.md
    - Image Segmentation: cnn/segmentation.md
  - Transformers in Vision:
    - Vision Transformers (ViT): transformers/intro.md
  - Advanced Concepts:
    - DINO: advanced/dino.md
    - CLIP: advanced/clip.md
